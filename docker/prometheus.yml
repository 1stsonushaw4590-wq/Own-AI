global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'inference'
    static_configs:
      - targets: ['inference:8001']

  - job_name: 'sandbox'
    static_configs:
      - targets: ['sandbox:8002']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
